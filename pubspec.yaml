name: flutter_litert_flex
description: >-
  FlexDelegate (SELECT_TF_OPS) addon for flutter_litert. Bundles the
  TensorFlow Lite Flex delegate native library for all platforms at build time.
version: 0.0.3
homepage: https://github.com/hugocornellier/flutter_litert
repository: https://github.com/hugocornellier/flutter_litert_flex
issue_tracker: https://github.com/hugocornellier/flutter_litert_flex/issues

topics:
  - machine-learning
  - tflite
  - tensorflow
  - on-device-training

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.hugocornellier.flutter_litert_flex
        pluginClass: FlutterLitertFlexPlugin
      ios:
        pluginClass: FlutterLitertFlexPlugin
      linux:
        pluginClass: FlutterLitertFlexPlugin
      macos:
        pluginClass: FlutterLitertFlexPlugin
      windows:
        pluginClass: FlutterLitertFlexPluginCApi
